<!DOCTYPE html>
<html>
<head>
  <title>Inspect Thumbnail</title>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="output" style="font-family: monospace; white-space: pre; margin-top: 20px;">Analyzing...</div>
  <script>
    const img = new Image();
    img.src = '/template_thumbnail.png';
    img.onload = () => {
      const canvas = document.getElementById('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const imgData = ctx.getImageData(0, 0, img.width, img.height);
      const data = imgData.data;

      let outputText = `Image size: ${img.width}x${img.height}\n\n`;

      // Find the white pixels of the "G" logo in the top-right corner
      // Top-right area: x from 800 to 1024, y from 0 to 200
      let whiteMinX = 1024, whiteMaxX = 0, whiteMinY = 576, whiteMaxY = 0;
      let tealMinX = 1024, tealMaxX = 0, tealMinY = 576, tealMaxY = 0;

      for (let y = 0; y < 200; y++) {
        for (let x = 800; x < img.width; x++) {
          const idx = (y * img.width + x) * 4;
          const r = data[idx];
          const g = data[idx+1];
          const b = data[idx+2];

          // White logo is very white (e.g., R > 240, G > 240, B > 240)
          if (r > 240 && g > 240 && b > 240) {
            if (x < whiteMinX) whiteMinX = x;
            if (x > whiteMaxX) whiteMaxX = x;
            if (y < whiteMinY) whiteMinY = y;
            if (y > whiteMaxY) whiteMaxY = y;
          }

          // Teal banner color
          if (r < 75 && g > 110 && b > 130) {
            if (x < tealMinX) tealMinX = x;
            if (x > tealMaxX) tealMaxX = x;
            if (y < tealMinY) tealMinY = y;
            if (y > tealMaxY) tealMaxY = y;
          }
        }
      }

      outputText += `TVG "G" Logo (White Pixels in top-right):\n`;
      outputText += `X: ${whiteMinX} to ${whiteMaxX} (width: ${whiteMaxX - whiteMinX})\n`;
      outputText += `Y: ${whiteMinY} to ${whiteMaxY} (height: ${whiteMaxY - whiteMinY})\n\n`;

      outputText += `TVG Teal Banner (Teal Pixels in top-right):\n`;
      outputText += `X: ${tealMinX} to ${tealMaxX} (width: ${tealMaxX - tealMinX})\n`;
      outputText += `Y: ${tealMinY} to ${tealMaxY} (height: ${tealMaxY - tealMinY})\n\n`;

      // Find "HORA GALEGA" logo bounding box in the top-left area
      // Let's search from x=0 to 400, y=0 to 250 for non-white, non-transparent pixels
      let progMinX = 1024, progMaxX = 0, progMinY = 576, progMaxY = 0;
      for (let y = 0; y < 250; y++) {
        for (let x = 0; x < 400; x++) {
          const idx = (y * img.width + x) * 4;
          const r = data[idx];
          const g = data[idx+1];
          const b = data[idx+2];
          const a = data[idx+3];

          // The logo is colorful/dark (not white background: R < 240 || G < 240 || B < 240)
          if (a > 50 && (r < 240 || g < 240 || b < 240)) {
            if (x < progMinX) progMinX = x;
            if (x > progMaxX) progMaxX = x;
            if (y < progMinY) progMinY = y;
            if (y > progMaxY) progMaxY = y;
          }
        }
      }

      outputText += `Program Logo "HORA GALEGA" Bounding Box (top-left):\n`;
      outputText += `X: ${progMinX} to ${progMaxX} (width: ${progMaxX - progMinX})\n`;
      outputText += `Y: ${progMinY} to ${progMaxY} (height: ${progMaxY - progMinY})\n`;

      document.getElementById('output').textContent = outputText;
    };
  </script>
</body>
</html>
