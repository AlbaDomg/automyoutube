<!DOCTYPE html>
<html>
<body>
  <canvas id="canvas"></canvas>
  <div id="color">Analyzing...</div>
  <script>
    const img = new Image();
    img.src = '/template_thumbnail.png';
    img.onload = () => {
      const canvas = document.getElementById('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const data = ctx.getImageData(980, 10, 1, 1).data;
      document.getElementById('color').textContent = `RGB: ${data[0]}, ${data[1]}, ${data[2]}, ${data[3]}`;
    };
  </script>
</body>
</html>
